name: 아침 브리핑 자동 발송

on:
  schedule:
    # 한국 시간 06:30 = UTC 전날 21:30
    - cron: '30 21 * * *'
  workflow_dispatch:  # 수동 실행 허용
    inputs:
      force:
        description: '중복 방지 무시하고 강제 발송'
        type: boolean
        default: true

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: input/output 폴더 생성
        run: mkdir -p input output

      - name: 구글 서비스 계정 키 파일 생성
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > input/service-account.json

      - name: .env 파일 생성
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_TOKEN }}" > input/.env
          echo "TELEGRAM_CHAT_ID=${{ secrets.CHAT_ID }}" >> input/.env
          echo "GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}" >> input/.env
          echo "GOOGLE_APPLICATION_CREDENTIALS=input/service-account.json" >> input/.env
          echo "GOOGLE_CALENDAR_ID=${{ secrets.GOOGLE_CALENDAR_ID }}" >> input/.env

      - name: 아침 브리핑 실행
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force }}" = "true" ]; then
            python main.py --force
          else
            python main.py
          fi
